; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.2.13
    m5stack/M5GFX@^0.2.19
    m5stack/M5Dial@^1.0.3
    lvgl/lvgl@^9.5.0
build_flags =
    -DLV_CONF_SKIP
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_FONT_MONTSERRAT_32=1
    -DLV_FONT_MONTSERRAT_48=1
    -DARDUINO_M5STACK_DIAL
    ; Required for LVGL Pro Editor XML support (if using runtime XML loading)
    ; -DLV_USE_XML=1
    ; Uncomment above if you want to load XML files at runtime instead of using exported C code